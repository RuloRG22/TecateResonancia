<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecate Resonancia | Más información</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/img/logopng.png">
</head>
<body>

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo-link">
                <img src="assets/img/logopng.png" alt="Logo Tecate Resonancia" class="logo">
            </a>

            <nav class="main-nav">
                <a href="index.html#ubicacion">Ubicación</a>
                <a href="boletos.html">Boletos</a>
                <a href="info.html" class="active-link">Más información</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section info-section">
            <div class="container">
                <h1 class="section-title" style="margin: 0 auto 2rem;">Suscríbete para más información</h1>

                <div class="form-card">
                    <form action="#" method="post" class="subscription-form">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
                        </div>

                        <div class="form-group">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>
                        </div>

                        <div class="form-group">
                            <label for="telefono">Teléfono celular</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="Ingresa tu teléfono" required>
                        </div>

                        <div class="form-group">
                            <label for="correo">Correo electrónico</label>
                            <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required>
                        </div>

                        <div class="form-actions">
                            <input type="submit" value="Suscribirme" class="submit-btn">
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-container">
            <a href="index.html" class="footer-logo-link">
                <img src="assets/img/logopng.png" alt="Logo Tecate Resonancia" class="footer-logo">
            </a>

            <div class="social-block">
                <h2>Redes sociales</h2>
                <div class="social-links">
                    <a href="#" aria-label="Instagram" id="instagram-link">
                        <img src="assets/icons/instagram.png" alt="Instagram">
                    </a>
                    <a href="#" aria-label="Facebook" id="facebook-link">
                        <img src="assets/icons/facebook.png" alt="Facebook">
                    </a>
                    <a href="#" aria-label="X" id="x-link">
                        <img src="assets/icons/x.png" alt="X">
                    </a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
